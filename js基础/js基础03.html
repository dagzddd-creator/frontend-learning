<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h2 {
      text-align: center;
    }

    table {
      border-collapse: collapse;
      margin: 0 auto;
      height: 80px;
      text-align: center;
    }

    table,
    th,
    td {
      border: 1px solid black;
    }

    th {
      padding: 5px 30px;
    }
  </style>
</head>

<body>
  <h2>本月消费支出</h2>

  <script>
    let sum = prompt('请输入银行卡余额：')
    let water = prompt('请输入水费：')
    let ele = prompt('请输入电费：')
    let wlan = prompt('请输入网费：')
    let result = sum - water - ele - wlan
    document.write(`
      <table>
        <tr>
          <th>银行卡余额</th>
          <th>电费</th>
          <th>水费</th>
          <th>网费</th>
          <th>银行卡余额</th>
        </tr>
        <tr>
          <td>${sum}元</td>
          <td>${water}元</td>
          <td>${ele}元</td>
          <td>${wlan}元</td>
          <td>${result}元</td>
        </tr>
      </table>
    `)
  </script>
</body>

</html>
